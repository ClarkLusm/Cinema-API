services:
  mysql:
    image: mariadb:11.4
    container_name: cinema-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MARIADB_DATABASE: ${DB_NAME:-db_cinema}
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "1"
      TZ: Asia/Bangkok
    volumes:
      - ./.data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
